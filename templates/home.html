{% extends "base.html" %}

{% block content %}
<h1>AI Story Generator</h1>

<form method="POST">
    <label for="prompt">Enter your story idea:</label><br>
    <textarea name="prompt" id="prompt" rows="5" cols="60" required></textarea><br><br>
    <button type="submit">Generate Story</button>
</form>

{% if story %}
    <h2>Generated Story</h2>
    <p style="white-space: pre-wrap;">{{ story }}</p>
{% endif %}

{% if image_paths %}
    <h2>Generated Images</h2>

    {% for image in image_paths %}
        <img src="{{ image }}" width="300" alt="Generated story image">
        <br><br>
    {% endfor %}
{% endif %}

{% endblock %}
