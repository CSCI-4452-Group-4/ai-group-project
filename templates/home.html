{% extends "base.html" %}

{% block content %}
<h1>AI Story Generator</h1>

<form method="POST">
    <label for="prompt">Enter your story idea:</label><br>
    <textarea id="prompt" name="prompt" rows="5" cols="60" required></textarea><br><br>

    <button type="submit">Generate Story</button>
</form>

{% if story %}
    <h2>Your Story</h2>
    <p style="white-space: pre-wrap;">{{ story }}</p>
{% endif %}

{% endblock %}
