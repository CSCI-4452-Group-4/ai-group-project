{% extends "base.html" %}

{% block content %}
    <h2>Create a Story</h2>

    <form method="POST">
        <textarea name="prompt" rows="6" cols="70" placeholder="Enter your story prompt..." required></textarea>
        <br><br>
        <button type="submit">Generate Story</button>
    </form>

    {% if story %}
        <hr>
        <h2>Generated Story</h2>
        <p style="white-space: pre-wrap;">{{ story }}</p>
    {% endif %}
{% endblock %}
